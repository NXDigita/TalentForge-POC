# TalentForge — local/dev infrastructure
# Usage:  cp .env.example .env  &&  docker compose up -d
# Note: the top-level `version:` key is obsolete in Compose v2 and intentionally removed.

name: talentforge

services:
  postgres:
    image: postgres:16.4-alpine          # pin minor version — reproducible across both machines
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-talentforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-talentforge}
      # faster local dev; do NOT use in prod compose file
      POSTGRES_INITDB_ARGS: "--data-checksums"
    command: >
      postgres
      -c shared_buffers=256MB
      -c max_connections=100
      -c log_min_duration_statement=200
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"            # bind to localhost only — never expose DB on 0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-talentforge} -d ${POSTGRES_DB:-talentforge}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    shm_size: 256mb                      # avoids Postgres shared-memory errors under load tests
    deploy:
      resources:
        limits:
          memory: 1g

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    # AOF persistence (BullMQ jobs survive restarts) + password + memory cap
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --requirepass ${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}
      --maxmemory 256mb
      --maxmemory-policy noeviction
    volumes:
      - redis-data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 384m

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z   # pin — `latest` breaks reproducibility
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in .env}
    volumes:
      - minio-data:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512m

  # One-shot init: creates the buckets your app expects, then exits.
  # Removes the "bucket does not exist" class of first-run bugs.
  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/submissions &&
      mc mb --ignore-existing local/certificates &&
      mc anonymous set download local/certificates &&
      exit 0
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    restart: "no"

volumes:
  postgres-data:
  redis-data:
  minio-data:

# Default network is created automatically as `talentforge_default`.
# App services (backend/worker) added later should use:
#   depends_on:
#     postgres: { condition: service_healthy }
#     redis:    { condition: service_healthy }
#     minio:    { condition: service_healthy }
